<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Moonlit Books - Profile</title>

    <!-- GOOGLE FONT -->
    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- BOXICONS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
          rel='stylesheet'>

    <!-- CSS -->
    <link rel="stylesheet"
          href="css/profile.css">

</head>

<body>

    <!-- DASHBOARD -->
    <div class="dashboard-container">

        <!-- SIDEBAR -->
        <div class="sidebar"
             id="sidebar">

            <!-- TOP -->
            <div>

                <!-- BRAND -->
                <div class="brand">

                    <img src="image/logo.png"
                         alt="Moonlit Books Logo"
                         class="logo">

                    <div class="brand-text">

                        <h2>
                            Moonlit <br>
                            Books
                        </h2>

                    </div>

                </div>

                <!-- MENU -->
                <ul class="menu-links">

                    <li>

                        <a href="dashboard.html">

                            <i class='bx bxs-dashboard'></i>

                            <span>
                                Dashboard
                            </span>

                        </a>

                    </li>

                    <li>

                        <a href="mybooks.html">

                            <i class='bx bx-book'></i>

                            <span>
                                My Books
                            </span>

                        </a>

                    </li>

                    <li>

                        <a href="toread.html">

                            <i class='bx bx-bookmark'></i>

                            <span>
                                To Read
                            </span>

                        </a>

                    </li>

                    <li>

                        <a href="currentlyreading.html">

                            <i class='bx bx-time-five'></i>

                            <span>
                                Currently Reading
                            </span>

                        </a>

                    </li>

                    <li>

                        <a href="read.html">

                            <i class='bx bx-check-circle'></i>

                            <span>
                                Read
                            </span>

                        </a>

                    </li>

                    <li>

                        <a href="review.html">

                            <i class='bx bx-star'></i>

                            <span>
                                Reviews
                            </span>

                        </a>

                    </li>

                    <li>

                        <a href="stats.html">

                            <i class='bx bx-bar-chart-alt-2'></i>

                            <span>
                                Stats
                            </span>

                        </a>

                    </li>

                    <li class="active">

                        <a href="profile.html">

                            <i class='bx bx-user'></i>

                            <span>
                                Profile
                            </span>

                        </a>

                    </li>

                </ul>

            </div>

            <!-- LOGOUT -->
            <div class="logout-btn">

                <a href="index.html">

                    <i class='bx bx-log-out'></i>

                    <span>
                        Logout
                    </span>

                </a>

            </div>

        </div>

        <!-- MAIN -->
        <div class="main-content">

            <!-- TOPBAR -->
            <div class="topbar">

                <!-- MENU -->
                <div class="menu-toggle"
                     id="menuToggle">

                    <i class='bx bx-menu'></i>

                </div>

                <!-- SEARCH -->
                <div class="search-box">

                    <input type="text"
                           placeholder="Search profile settings...">

                    <i class='bx bx-search'></i>

                </div>

                <!-- RIGHT -->
                <div class="top-right">

                    <!-- NOTIFICATION -->
                    <a href="notification.html"
                       class="notification">

                        <i class='bx bx-bell'></i>

                        <span>
                            3
                        </span>

                    </a>

                    <!-- PROFILE -->
                    <div class="profile-box">

                        <img src="image/profilepicture.jpg"
                             alt="Profile"
                             class="profile-img">

                    </div>

                </div>

            </div>

            <!-- HEADER -->
            <div class="page-header">

                <div>

                    <h1>
                        My Profile
                    </h1>

                    <p>
                        Manage your personal information and account settings.
                    </p>

                </div>

            </div>

            <!-- PROFILE WRAPPER -->
            <div class="profile-wrapper">

                <!-- LEFT -->
                <div class="profile-card">

                    <div class="profile-image-box">

                        <img src="image/profilepicture.jpg"
                             alt="Profile Picture"
                             class="main-profile-img">

                    </div>

                    <h2>
                        Yuki Kantee
                    </h2>

                    <p class="email">
                        yukikantee@example.com
                    </p>

                    <div class="profile-stats">

                        <div>

                            <h3>
                                8
                            </h3>

                            <span>
                                Books
                            </span>

                        </div>

                        <div>

                            <h3>
                                4
                            </h3>

                            <span>
                                Reviews
                            </span>

                        </div>

                        <div>

                            <h3>
                                12
                            </h3>

                            <span>
                                Goals
                            </span>

                        </div>

                    </div>

                    <button class="edit-photo-btn">

                        <i class='bx bx-camera'></i>

                        Change Photo

                    </button>

                </div>

                <!-- RIGHT -->
                <div class="details-card">

                    <div class="section-title">

                        <h3>
                            Personal Information
                        </h3>

                    </div>

                    <!-- FORM -->
                    <form class="profile-form">

                        <div class="input-group">

                            <label>
                                Full Name
                            </label>

                            <input type="text"
                                   value="Yuki Kantee">

                        </div>

                        <div class="input-group">

                            <label>
                                Email Address
                            </label>

                            <input type="email"
                                   value="yukikantee@example.com">

                        </div>

                        <div class="input-group">

                            <label>
                                Username
                            </label>

                            <input type="text"
                                   value="yukikantee">

                        </div>

                        <div class="input-group">

                            <label>
                                Favorite Genre
                            </label>

                            <input type="text"
                                   value="Fantasy & Romance">

                        </div>

                        <div class="input-group full-width">

                            <label>
                                Bio
                            </label>

                            <textarea rows="5">A passionate reader who loves fantasy worlds, emotional stories and discovering new books every month.</textarea>

                        </div>

                        <!-- BUTTONS -->
                        <div class="button-group">

                            <button type="submit"
                                    class="save-btn">

                                Save Changes

                            </button>

                            <button type="button"
                                    class="cancel-btn">

                                Cancel

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- JAVASCRIPT -->
    <script>

        const menuToggle =
            document.getElementById("menuToggle");

        const sidebar =
            document.getElementById("sidebar");

        menuToggle.onclick = function(){

            sidebar.classList.toggle("close");

        };

    </script>

</body>
</html>
